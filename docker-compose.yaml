services:

  db:
    image: postgres:15
    container_name: backstage-db
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    ports:
      - "5432:5432"
    networks:
      - backstage-net
    volumes:
      - pgdata:/var/lib/postgresql/data

  backstage:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: backstage
    depends_on:
      - db
    ports:
      - "7007:7007"
      - "3000:3000"
    environment:
      NODE_ENV: development

      # DB config
      POSTGRES_HOST: db
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage

    volumes:
      # IMPORTANT: mount templates so they show up
      - ./templates:/app/templates

      # optional: hot reload configs
      - ./app-config.yaml:/app/app-config.yaml

    networks:
      - backstage-net

networks:
  backstage-net:
    driver: bridge

volumes:
  pgdata:
