apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}
  namespace: default
  labels:
    app: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  selector:
    app: ${{ values.name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
